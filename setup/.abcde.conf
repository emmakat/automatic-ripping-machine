#Jessica's Customized .abcde.conf file
# CDDB options

CDDBMETHOD=musicbrainz

# The CDDB protocol requires hello information, including a valid username
# and hostname. If you feel paranoid about giving away such info, edit this
# line - the format is username@hostname.
HELLOINFO="`whoami`@`hostname`"

# Specify the style of encoder to use here -
# oggenc, vorbize - for OGGENCODERSYNTAX
# lame, gogo, bladeenc, l3enc, xingmp3enc, mp3enc - for MP3ENCODERSYNTAX
# flac - the only supported for FLACENCODERSYNTAX at the moment

MP3ENCODERSYNTAX=default
#OGGENCODERSYNTAX=default
#FLACENCODERSYNTAX=default

# CD reader program to use - currently recognized options are 'cdparanoia',
# 'libcdio' (cd-paranoia),'icedax', 'cdda2wav', 'dagrab', 'pird',
CDROMREADERSYNTAX=cdparanoia

# Keep the wav files after encoding. Set it to "y" and remove "clean" from
# the list of default actions, since we purge the temp directory as default.
KEEPWAVS=n

# Track padding: force abcde to pad tracks using 0, so every song uses a two
# digit entry.
PADTRACKS=y

# Define if you want abcde to be non-interactive.
INTERACTIVE=n

# Specify 'nice'ness of the encoder, the CD reader and the distmp3 proc.
# Setting these to be empty will result in some default niceness increase (4 in tcsh
# and 10 using the bsdutils' nice).
#ENCNICE=10
#READNICE=10
#DISTMP3NICE=10

# Paths of programs to use

# Encoders:
#LAME=lame

#FLAC=flac

# Taggers, rippers, replaygain etc:
#ID3=id3
#ID3V2=id3v2
#MID3V2=mid3v2
EYED3=eyeD3
CDPARANOIA=cdparanoia
#CD_PARANOIA=cd-paranoia
#CDDA2WAV=icedax
#PIRD=pird
#CDDAFS=cp
CDDISCID=cd-discid
#CDDBTOOL=cddb-tool
EJECT=eject
#MD5SUM=md5sum
#DISTMP3=distmp3
#NORMALIZE=normalize-audio
#GLYRC=glyrc
#IDENTIFY=identify
#CONVERT=convert

# MP3:
LAMEOPTS='-V 0'

# mp3 tagging:
# There are three ways to tag MP3 files:
#   1. id3v1 (with id3)
#   2. id3v2.3 (with id3v2)
#   3. id3v2.4 (with eyeD3) This is the default

EYED3OPTS='--to-v2.4 --non-std-genres'

# Actions to take
# Comma-separated list of one or more of the following:
#  cddb,cue,read,normalize,encode,tag,move,replaygain,playlist,getalbumart,embedalbumart,clean,default
ACTIONS=musicbrainz,getalbumart,read,encode,tag,move

# If you'd like to make a default location that overrides the current
# directory for putting mp3's, uncomment this.
# OUTPUTDIR="$home/Music/"
OUTPUTDIR="/home/arm/Music/"

# OUTPUTTYPE can be any of a number of formats, either a single format
OUTPUTTYPE=mp3

OUTPUTFORMAT='${OUTPUT}/Albums/${ARTISTFILE} - ${ALBUMFILE} (${CDYEAR})/${TRACKNUM}.${TRACKFILE}'

# Like OUTPUTFORMAT but for Various Artists discs.
VAOUTPUTFORMAT='${OUTPUT}/Compilations/${ALBUMFILE} \(${CDYEAR}\)/${TRACKNUM}.${ARTISTFILE}-${TRACKFILE}'

# Define how many encoders to run at once. This makes for huge speedups
# on SMP systems. Defaults to 1. Equivalent to -j.
MAXPROCS=4

# Support for systems with low disk space:
# n:	Default parallelization (read entire CD in while encoding)
# y:	No parallelization (rip, encode, rip, encode...)
#LOWDISK=n

mungefilename ()
{ 
    echo "$@" | sed -e 's/^\.*//' | tr -d ":><|*/\"'?[:cntrl:]" 
}

# Custom post-read function
#--------------------------------------------------------------------------#
#  A post_encode function to embed album art downloaded with abcde 2.7     #
#  and greater using the new getalbumart function. This version of the     #
#  post_encode function will embed with multiple formats at the same time: #
#                                                                          #
#      * mp3 : eyeD3 will be required                                      #
#      * flac: metaflac will be required                                   #
#      * m4a : AtomicParsley will be required                              #
#                                                                          #
#  To use this function copy this entire code block and paste it into      #
#  your ~/.abcde.conf file.                                                #
#                                                                          #
#                abcde: Downloading Album Art...                           #
#    http://www.andrews-corner.org/linux/abcde/getalbumart.html            #
#--------------------------------------------------------------------------#
post_encode () {
    cover='cover.jpg'
    ARTISTFILE=$(mungefilename "${TRACKARTIST}")
    ALBUMFILE=$(mungefilename "${DALBUM}")

    for OUTPUT in $(echo "${OUTPUTTYPE}" | tr , \ ); do
        if [ "${VARIOUSARTISTS}" = "y" ] ; then
            format="${VAOUTPUTFORMAT}"
        else
            format="${OUTPUTFORMAT}"
        fi
        path="$(eval echo "\"${format}\"")"
        cd "${OUTPUTDIR}/$(dirname "${path}")"
        [ -e "${cover}" ] || { vecho "Cover image not found." >&2; return 1; }
        case "${OUTPUT}" in
            mp3)  for file in *.mp3;  do eyeD3 ${EYED3OPTS} --add-image "${cover}:FRONT_COVER" "${file}"; done ;;
            flac) for file in *.flac; do metaflac "--import-picture-from=${cover}" "${file}";             done ;;
            m4a)  for file in *.m4a;  do AtomicParsley "${file}" --artwork "${cover}" --overWrite;        done ;;
            *)    vecho "Output format ${OUTPUT} is not supported." >&2; return 1
        esac
        vecho "The ${OUTPUT} files now have the album art embedded." >&2
    done
}

# If you'd like to have abcde eject the cdrom after all the tracks have been
# read, uncomment the following line.
EJECTCD=y

# Set to 1,2, etc. to obtain some information about actions happening in the background
EXTRAVERBOSE=1
